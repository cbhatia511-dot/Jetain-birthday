<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday My Princess 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    text-align: center;
    background: linear-gradient(135deg, #ffd6e7, #ffe9f3, #fff5fa);
    overflow-x: hidden;
}

/* Floating Hearts */
.heart {
    position: fixed;
    color: red;
    animation: float 6s linear infinite;
    font-size: 20px;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Heading */
h1 {
    font-size: 50px;
    color: #ff1493;
    margin-top: 80px;
    text-shadow: 0 0 20px #ff69b4;
}

/* Boxes */
.box {
    display: none;
    margin: 20px auto;
    padding: 25px;
    width: 85%;
    max-width: 550px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 0 20px pink;
    position: relative;
}

button {
    padding: 12px 25px;
    margin: 15px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1493;
    transform: scale(1.1);
}

.letterText {
    font-size: 18px;
    line-height: 1.6;
    min-height: 150px;
    white-space: pre-line;
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: 0;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid pink;
}
</style>
</head>

<body>

<audio id="song" src="birthday.mp3" loop></audio>
</audio>

<h1>🎂 Happy Birthday My Princess 💖</h1>

<div id="mainButtons">
<button onclick="startMusic()">🎵 Play Song</button>
<button onclick="showLetter()">💌 Open Letter</button>
<button onclick="showProposal()">💍 Proposal</button>
<button onclick="showSurprise()">🎁 Surprise</button>
</div>

<!-- LETTER -->
<div id="letter" class="box">
<h2>💌 My Hidden Letter</h2>
<div class="letterText" id="typingText"></div>
<br>
<button onclick="goBack('letter')">🔙 Back</button>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="box">
<h2>💍 A Question For You</h2>
<p>Will you stay with me forever? ❤️</p>

<button onclick="sayYes()">YES 💕</button>

<button id="noBtn" onmouseover="moveNoButton()" 
style="position:absolute;">NO 😜</button>

<br><br>
<button onclick="goBack('proposal')">🔙 Back</button>
</div>

<!-- SURPRISE QUIZ -->
<div id="surprise" class="box">
<h2>🎁 Love Memory Quiz 💖</h2>

<p>1️⃣ When we start talking? (DD/MM)</p>
<input type="text" id="q1">

<p>2️⃣ When our relationship started? (DD/MM)</p>
<input type="text" id="q2">

<p>3️⃣ First Hug? (DD/MM)</p>
<input type="text" id="q3">

<p>4️⃣ First Kiss? (DD/MM)</p>
<input type="text" id="q4">

<br><br>
<button onclick="checkQuiz()">Submit Answers 💕</button>

<br><br>
<p id="quizResult"></p>

<button onclick="goBack('surprise')">🔙 Back</button>
</div>

<script>

/* Floating Hearts */
setInterval(function() {
    var heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 400);

/* Music */
function startMusic() {
    document.getElementById("song").play();
}

/* Navigation */
function hideMain() {
    document.getElementById("mainButtons").style.display = "none";
}

function showMain() {
    document.getElementById("mainButtons").style.display = "block";
}

function showLetter() {
    hideMain();
    document.getElementById("letter").style.display = "block";
    typeWriter();
}

function showProposal() {
    hideMain();
    document.getElementById("proposal").style.display = "block";
}

function showSurprise() {
    hideMain();
    document.getElementById("surprise").style.display = "block";
}

function goBack(id) {
    document.getElementById(id).style.display = "none";
    showMain();
}

/* Typing Effect */
var message = `My Princess 💖

On this beautiful day, I just want to say…
You are the most precious gift of my life.
Your smile makes my darkest days bright.
Your voice is my favorite sound.
And your love is my greatest blessing.

I love you forever 💕`;

var i = 0;

function typeWriter() {
    var textBox = document.getElementById("typingText");
    textBox.innerHTML = "";
    i = 0;
    function typing() {
        if (i < message.length) {
            textBox.innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 40);
        }
    }
    typing();
}

/* Escaping NO */
function moveNoButton() {
    var button = document.getElementById("noBtn");
    var x = Math.random() * (window.innerWidth - 100);
    var y = Math.random() * (window.innerHeight - 100);
    button.style.left = x + "px";
    button.style.top = y + "px";
}

/* YES Confetti */
function sayYes() {
    alert("YAYYYY 💖 I LOVE YOUUUU 😍");
    createConfetti();
}

/* Love Quiz */
function checkQuiz(){

    var a1 = document.getElementById("q1").value;
    var a2 = document.getElementById("q2").value;
    var a3 = document.getElementById("q3").value;
    var a4 = document.getElementById("q4").value;

    if(a1==="1103" && a2==="2303" && a3==="2507" && a4==="2408"){
        
        document.getElementById("quizResult").innerHTML =
        "Correct 😍💖 Your Secret Code is: 110306 👑";

        createConfetti();

    } else {

        alert("Think again 🥺💔");
    }
}

/* Confetti Function */
function createConfetti(){
    for(let i=0;i<100;i++){
        var conf = document.createElement("div");
        conf.className="confetti";
        conf.style.left=Math.random()*100+"vw";
        conf.style.background="hsl("+Math.random()*360+",100%,50%)";
        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),3000);
    }
}

</script>

</body>
</html>
